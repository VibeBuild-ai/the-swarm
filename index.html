<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Build | Swarm Intelligence Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.24/jsrsasign-all-min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root { --bg-obsidian: #0a0c10; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.08); }
        body { background-color: var(--bg-obsidian); color: #f1f5f9; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .font-display { font-family: 'Outfit', sans-serif; }
        .glass-panel { background: var(--glass-bg); backdrop-filter: blur(30px); border: 1px solid var(--glass-border); border-radius: 16px; }
        .nav-item { cursor: pointer; transition: all 0.2s ease; color: #64748b; }
        .nav-item.active { background: rgba(59, 130, 246, 0.1); color: #60a5fa; border-right: 3px solid #3b82f6; }
        .log-container::-webkit-scrollbar { width: 6px; }
        .log-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .view-animate { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-80 border-r border-white/5 bg-black/60 flex flex-col shadow-2xl">
        <div class="p-8">
            <div class="flex items-center space-x-3 mb-10">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-fuchsia-600 rounded-lg flex items-center justify-center font-bold text-white shadow-xl">VB</div>
                <span class="font-display font-bold text-xl tracking-tighter uppercase tracking-widest text-blue-400">COMMANDER</span>
            </div>
            
            <nav class="space-y-4">
                <div onclick="switchView('dashboard')" id="nav-dashboard" class="nav-item active p-4 rounded-xl flex items-center text-xs uppercase font-bold tracking-[0.2em]">
                    <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    Terminal
                </div>
                <div onclick="switchView('connector')" id="nav-connector" class="nav-item p-4 rounded-xl flex items-center text-xs uppercase font-bold tracking-[0.2em]">
                    <svg class="w-4 h-4 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 11-2 0v-1a1 1 0 00-1-1H9a1 1 0 01-1-1v-3a1 1 0 011-1h1a2 2 0 100-4H9a1 1 0 01-1-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"></path></svg>
                    Authority Bridge
                </div>

                <div class="pt-8 mt-6 border-t border-white/5">
                    <p class="text-[10px] uppercase font-bold text-slate-500 mb-4 tracking-[0.15em]">Specialist Presets</p>
                    <div class="space-y-3">
                        <button onclick="setPrompt('researcher')" class="w-full p-4 bg-white/5 border border-white/5 rounded-xl text-left hover:bg-white/10 transition-all group">
                            <div class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-1 group-hover:text-blue-300">Researcher Call</div>
                            <div class="text-[9px] text-slate-600 italic">Deep Intelligence Scan</div>
                        </button>
                        <button onclick="setPrompt('auditor')" class="w-full p-4 bg-white/5 border border-white/5 rounded-xl text-left hover:bg-white/10 transition-all group">
                            <div class="text-[10px] font-black text-fuchsia-400 uppercase tracking-widest mb-1 group-hover:text-fuchsia-300">Code Auditor</div>
                            <div class="text-[9px] text-slate-600 italic">Security Audit</div>
                        </button>
                        <button onclick="setPrompt('analyst')" class="w-full p-4 bg-white/5 border border-white/5 rounded-xl text-left hover:bg-white/10 transition-all group">
                            <div class="text-[10px] font-black text-green-400 uppercase tracking-widest mb-1 group-hover:text-green-300">Final Analyst</div>
                            <div class="text-[9px] text-slate-600 italic">Final Synthesis</div>
                        </button>
                    </div>
                </div>
            </nav>
        </div>
        <div class="mt-auto p-8 border-t border-white/5 bg-black/20">
             <div class="text-[10px] text-slate-600 uppercase font-black tracking-widest mb-1">Nexus Status</div>
             <div id="engine-status" class="text-xs font-mono text-red-500 uppercase">Disconnected</div>
             <div class="text-[7px] text-slate-800 uppercase mt-4 tracking-widest opacity-50">v2.0.3 - API Whisperer</div>
        </div>
    </aside>

    <!-- CONTENT -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 border-b border-white/5 px-10 flex items-center justify-between bg-black/40">
            <h2 id="view-title" class="font-display font-medium text-slate-400 text-xs tracking-[0.3em] uppercase">Swarm Dashboard</h2>
            <div id="active-project-badge" class="text-[9px] font-mono text-slate-700 uppercase tracking-widest border border-white/10 px-4 py-2 rounded-full italic">Unauthorized</div>
        </header>

        <!-- TERMINAL VIEW -->
        <div id="view-dashboard" class="flex flex-col flex-1 p-10 space-y-10 overflow-y-auto view-animate">
            <div class="glass-panel p-2 shadow-2xl transition-all border-blue-500/10">
                <textarea id="commandInput" placeholder="CMD: Welches Intelligenz-Asset soll der Schwarm generieren?" 
                          class="w-full h-44 bg-transparent p-8 text-slate-100 text-lg font-light outline-none resize-none placeholder-slate-800"></textarea>
                
                <div class="flex items-center justify-between p-4 bg-black/40 rounded-b-xl border-t border-white/5">
                    <div id="auth-status" class="px-3 py-1 rounded-full bg-red-500/10 border border-red-500/20 text-[9px] font-bold text-red-400 uppercase">Authority Required</div>
                    <button onclick="dispatchSwarm()" id="dispatchBtn"
                            class="bg-blue-600 hover:bg-blue-500 text-white font-black py-4 px-12 rounded-xl shadow-2xl active:scale-95 transition-all uppercase tracking-widest text-xs">
                        DISPATCH SIGNAL
                    </button>
                </div>
            </div>

            <div class="glass-panel flex-1 flex flex-col overflow-hidden bg-black/60 border-white/5 shadow-2xl">
                <div class="px-8 py-4 bg-black/40 border-b border-white/5 flex items-center justify-between">
                     <span class="font-mono text-[9px] text-slate-600 uppercase tracking-widest animate-pulse">Live Cloud Nexus | Vertex AI</span>
                </div>
                <div id="log-terminal" class="flex-1 p-10 font-mono text-[11px] overflow-y-auto log-container space-y-4 leading-relaxed">
                    <div class="text-slate-800 uppercase text-center py-24 font-black tracking-[0.5em] opacity-40 italic">Awaiting Authority Link...</div>
                </div>
            </div>
        </div>

        <!-- CONNECTOR VIEW -->
        <div id="view-connector" class="hidden flex-1 flex items-center justify-center p-12 overflow-y-auto view-animate">
            <div class="w-full max-w-xl glass-panel p-12 border-t-2 border-blue-600 shadow-2xl">
                <div class="text-center mb-10">
                    <h3 class="text-3xl font-display font-black text-white uppercase tracking-widest">Cloud Nexus</h3>
                    <p class="text-slate-500 text-[10px] mt-2 font-mono uppercase italic">Authority Link Strategy</p>
                </div>
                <div class="space-y-6">
                    <div>
                        <label class="text-[9px] uppercase font-bold text-slate-500 tracking-widest block mb-2">Nexus Authority (JSON)</label>
                        <textarea id="jsonInput" oninput="extractJsonData()" placeholder="Paste full Service Account JSON content here..." 
                                  class="w-full h-48 bg-black/60 border border-white/5 rounded-2xl p-6 text-blue-400 font-mono text-[10px] focus:border-blue-500 outline-none transition-all resize-none shadow-inner"></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="flex flex-col space-y-2">
                             <label class="text-[8px] uppercase text-slate-700 font-bold ml-1">Cloud Project</label>
                             <input type="text" id="projectId" placeholder="Project ID" class="w-full bg-black/60 border border-white/5 rounded-xl p-4 text-[10px] font-mono text-slate-400 outline-none">
                        </div>
                        <div class="flex flex-col space-y-2">
                             <label class="text-[8px] uppercase text-slate-700 font-bold ml-1">Agent Engine</label>
                             <input type="text" id="agentId" value="the_swarm" class="w-full bg-black/60 border border-white/5 rounded-xl p-4 text-[10px] font-mono text-fuchsia-400 focus:border-fuchsia-500 outline-none transition-all">
                        </div>
                    </div>

                    <div>
                        <label class="text-[8px] uppercase text-slate-700 font-bold ml-1">Private VPS Proxy (Optional)</label>
                        <input type="text" id="vpsProxy" placeholder="e.g. http://YOUR_VPS_IP:5005" class="w-full bg-black/60 border border-white/5 rounded-xl p-4 text-[10px] font-mono text-green-500 focus:border-green-500 outline-none transition-all">
                    </div>
                    
                    <button onclick="saveConnectorData()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-6 rounded-2xl uppercase tracking-widest text-xs shadow-xl active:scale-95 transition-all">
                        ACTIVATE AUTHORITY
                    </button>
                    <p class="text-[8px] text-slate-700 text-center uppercase tracking-widest italic animate-pulse">Establishing encrypted nexus bridge...</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const terminal = document.getElementById('log-terminal');
        const input = document.getElementById('commandInput');
        const btn = document.getElementById('dispatchBtn');

        let auth = {
            projectId: localStorage.getItem('projectId') || '',
            privateKey: localStorage.getItem('privateKey') || '',
            clientEmail: localStorage.getItem('clientEmail') || '',
            location: localStorage.getItem('location') || 'us-central1',
            agentId: localStorage.getItem('agentId') || 'the_swarm',
            vpsProxy: localStorage.getItem('vpsProxy') || '',
            rawJson: localStorage.getItem('rawJson') || ''
        };

        let lastAgentResponse = "";

        function extractJsonData() {
            const raw = document.getElementById('jsonInput').value;
            try {
                const data = JSON.parse(raw);
                if (data.project_id) {
                    document.getElementById('projectId').value = data.project_id;
                    auth.projectId = data.project_id;
                    auth.privateKey = data.private_key;
                    auth.clientEmail = data.client_email;
                    auth.rawJson = raw;
                    addLog(`NEXUS: Project '${data.project_id}' secured.`, 'success');
                }
            } catch(e) {}
        }

        function saveConnectorData() {
            const raw = document.getElementById('jsonInput').value;
            try {
                const data = JSON.parse(raw);
                auth.projectId = data.project_id;
                auth.privateKey = data.private_key;
                auth.clientEmail = data.client_email;
            } catch(e) {}
            
            auth.projectId = auth.projectId || document.getElementById('projectId').value;
            auth.agentId = document.getElementById('agentId').value;
            auth.vpsProxy = document.getElementById('vpsProxy').value;
            auth.rawJson = raw; // IMMER speichern!

            Object.keys(auth).forEach(k => {
                if (auth[k]) localStorage.setItem(k, auth[k]);
            });

            updateUiStatus();
            switchView('dashboard');
        }

        function updateUiStatus() {
            const status = document.getElementById('auth-status');
            const badge = document.getElementById('active-project-badge');
            const engine = document.getElementById('engine-status');
            
            if (auth.privateKey && auth.projectId) {
                status.innerText = "AUTHORITY ACTIVE"; 
                status.className = "px-3 py-1 rounded-full bg-green-500/10 border border-green-500/20 text-[9px] font-bold text-green-500 uppercase";
                badge.innerText = `HUB: ${auth.projectId}`; badge.classList.add('text-blue-400');
                engine.innerText = "Operational"; engine.className = "text-xs font-mono text-green-500 uppercase";
                
                // Felder füllen
                if(document.getElementById('projectId')) document.getElementById('projectId').value = auth.projectId;
                if(document.getElementById('agentId')) document.getElementById('agentId').value = auth.agentId;
                if(document.getElementById('vpsProxy')) document.getElementById('vpsProxy').value = auth.vpsProxy;
            }
            
            // Textarea IMMER füllen, falls im Speicher (Jaanus-Feeling)
            if(document.getElementById('jsonInput') && auth.rawJson) {
                document.getElementById('jsonInput').value = auth.rawJson;
            }
        }
        updateUiStatus();

        function switchView(view) {
            ['dashboard', 'connector'].forEach(v => {
                const el = document.getElementById(`view-${v}`);
                const nav = document.getElementById(`nav-${v}`);
                if(el) el.classList.toggle('hidden', v !== view);
                if(nav) nav.classList.toggle('active', v === view);
            });
            document.getElementById('view-title').innerText = "VIBE BUILD // " + view.toUpperCase();
        }

        function addLog(msg, type) {
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString();
            let color = type === 'success' ? 'text-green-400' : (type === 'agent' ? 'text-blue-400 font-bold' : (type === 'error' ? 'text-red-500 font-black' : 'text-slate-600'));
            div.className = `flex ${color}`;
            div.innerHTML = `<span class="mr-6 opacity-20 font-mono text-[9px] tabular-nums">${time}</span> <span class="flex-1">${msg}</span>`;
            if (terminal.innerText.includes('Awaiting')) terminal.innerHTML = '';
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function multiFetch(targetUrl, options) {
            const proxies = [
                { name: "CodeTabs (Bridge 1)", url: "https://api.codetabs.com/v1/proxy?quest=" },
                { name: "CORS-Anywhere (Bridge 2)", url: "https://cors-anywhere.herokuapp.com/" },
                { name: "ThingProxy (Bridge 3)", url: "https://thingproxy.freeboard.io/fetch/" }
            ];

            for (const p of proxies) {
                try {
                    addLog(`BRIDGE: Testing ${p.name}...`, 'success');
                    const controller = new AbortController();
                    const id = setTimeout(() => controller.abort(), 8000);
                    
                    const fetchUrl = p.url + (p.name.includes("Anywhere") ? targetUrl : encodeURIComponent(targetUrl));
                    const response = await fetch(fetchUrl, { 
                        ...options, 
                        signal: controller.signal,
                        headers: { ...options.headers, "X-Requested-With": "XMLHttpRequest" } 
                    });
                    clearTimeout(id);

                    const text = await response.text();
                    
                    if (response.status === 403 && p.name.includes("Anywhere") && text.includes("corsdemo")) {
                        addLog(`BRIDGE: ${p.name} needs manual unlock.`, 'error');
                        window.open("https://cors-anywhere.herokuapp.com/corsdemo", "_blank");
                        alert("Bitte auf der neuen Seite 'Request temporary access' klicken, um die Nexus-Brücke freizuschalten!");
                        continue;
                    }

                    try { 
                        let json = null;
                        try { json = JSON.parse(text); } catch(ex) { }

                        if (json) {
                            addLog(`BRIDGE: ${p.name} connected.`, 'success');
                            if (!response.ok) {
                                const errMsg = json.error?.message || json.error_description || JSON.stringify(json);
                                throw new Error(`GOOGLE_API_ERROR: HTTP ${response.status} - ${errMsg}`);
                            }
                            return json; 
                        } else {
                            if (!response.ok) {
                                throw new Error(`PROXY_RAW_ERROR: HTTP ${response.status} - ${text.substring(0, 150)}`);
                            }
                        }
                    } catch(e) { 
                        if (e.message.includes("GOOGLE_API_ERROR") || e.message.includes("PROXY_RAW_ERROR")) throw e; 
                    }

                    addLog(`BRIDGE: ${p.name} proxy rejected signal.`, 'error');
                } catch(e) { 
                    if (e.message.includes("GOOGLE_API_ERROR") || e.message.includes("PROXY_RAW_ERROR")) throw e;
                    addLog(`BRIDGE: ${p.name} offline.`, 'error');
                }
            }
            throw new Error("ALL_BRIDGES_FAILED: Nexus currently unreachable.");
        }

        async function getAccessToken() {
            try {
                const header = { alg: "RS256", typ: "JWT" };
                const now = Math.floor(Date.now() / 1000);
                const payload = {
                    iss: auth.clientEmail,
                    scope: "https://www.googleapis.com/auth/cloud-platform",
                    aud: "https://oauth2.googleapis.com/token",
                    exp: now + 3600,
                    iat: now
                };
                const sHeader = JSON.stringify(header);
                const sPayload = JSON.stringify(payload);
                const jwt = KJUR.jws.JWS.sign("RS256", sHeader, sPayload, auth.privateKey);

                const tokenUrl = "https://oauth2.googleapis.com/token";
                
                // Nutze Multi-Brücke, falls kein VPS Proxy da ist
                if (auth.vpsProxy) {
                    const vpsUrl = `${auth.vpsProxy}/nexus_gateway?url=${encodeURIComponent(tokenUrl)}`;
                    const res = await fetch(vpsUrl, {
                        method: "POST",
                        headers: { "Content-Type": "application/x-www-form-urlencoded" },
                        body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
                    });
                    if(!res.ok) throw new Error("VPS Proxy Rejected Request");
                    return (await res.json()).access_token;
                }

                const data = await multiFetch(tokenUrl, {
                    method: "POST",
                    headers: { "Content-Type": "application/x-www-form-urlencoded" },
                    body: `grant_type=urn:ietf:params:oauth:grant-type:jwt-bearer&assertion=${jwt}`
                });
                return data.access_token;
            } catch(e) {
                throw new Error("AUTHORITY_BRIDGE_FAILURE: " + e.message);
            }
        }

        async function dispatchSwarm() {
            const prompt = input.value;
            if(!prompt) return alert("Directive required.");
            
            if (!auth.privateKey || !auth.projectId) {
                addLog('AUTHORITY_ERROR: Please link your Service Account JSON.', 'error');
                switchView('connector'); return;
            }

            btn.disabled = true;
            terminal.innerHTML = '';
            addLog(`NEXUS_HANDSHAKE: Securing autonomous authority token...`, 'success');

            try {
                const token = await getAccessToken();
                
                // We map 'the_swarm' to Gemini 2.5 Pro since Vertex doesn't have a native /agents REST API
                let modelId = auth.agentId === "the_swarm" || auth.agentId === "der_schwarm" ? "gemini-2.5-pro" : auth.agentId;
                if (!modelId.includes("gemini")) modelId = "gemini-2.5-pro"; // Fallback Safenet

                const endpoint = `https://${auth.location}-aiplatform.googleapis.com/v1/projects/${auth.projectId}/locations/${auth.location}/publishers/google/models/${modelId}:generateContent`;
                
                addLog(`BROADCAST: Sending signal via redundant Proxy-Bridge...`, 'success');
                
                const promptPayload = {
                    "contents": [{ "role": "user", "parts": [{ "text": prompt }] }],
                    "systemInstruction": { "parts": [{ "text": "Du bist der COMMANDER von VIBE BUILD | DER SCHWARM. Deine Aufgabe ist es, Befehle analytisch und professionell zu beantworten. Strukturiere deine Antwort als 'Mission Report' mit Teil-Einschätzungen von deinen Sub-Agenten (Researcher, Auditor, Analyst)." }] },
                    "generationConfig": { "temperature": 0.4 }
                };

                let data;
                if (auth.vpsProxy) {
                    const vpsUrl = `${auth.vpsProxy}/nexus_gateway?url=${encodeURIComponent(endpoint)}`;
                    const res = await fetch(vpsUrl, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(promptPayload)
                    });
                    if(!res.ok) throw new Error(`VPS_REJECTION: HTTP ${res.status}`);
                    data = await res.json();
                } else {
                    data = await multiFetch(endpoint, {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(promptPayload)
                    });
                }

                lastAgentResponse = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Mission parameters synchronized.';
                addLog(`AGENT_OUTPUT: ${lastAgentResponse}`, 'agent');
                const dl = `<a href="#" onclick="downloadRealAsset(); return false;" class="underline text-fuchsia-400 font-bold ml-2 uppercase">[Export Asset]</a>`;
                addLog(`SUCCESS: Intelligence synthesis complete. ${dl}`, 'success');

            } catch(e) {
                addLog(`CRITICAL_FAILURE: ${e.message}`, 'error');
            } finally {
                btn.disabled = false;
            }
        }

        function downloadRealAsset() {
            const blob = new Blob([`VIBE BUILD | INTELLIGENCE ASSET\n\nCommand: ${input.value}\n\nResult:\n${lastAgentResponse}`], { type: 'text/markdown' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'VibeBuild_Agent_Output.md';
            document.body.appendChild(a); a.click(); window.URL.revokeObjectURL(url);
        }

        function setPrompt(key) {
            const prompts = {
                researcher: "RESEARCHER: Scan the web for the latest AI trends for Q2 2026.",
                auditor: "AUDITOR: Perform a comprehensive security audit on the current infrastructure.",
                analyst: "ANALYST: Generate a final executive summary based on the gathered intelligence data."
            };
            input.value = prompts[key];
            input.focus();
            switchView('dashboard');
        }
    </script>
</body>
</html>
